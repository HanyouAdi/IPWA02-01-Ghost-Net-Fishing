<?xml version='1.0' encoding='UTF-8' ?>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="http://xmlns.jcp.org/jsf/html"
	  xmlns:f="http://xmlns.jcp.org/jsf/core"
	  xmlns:p="http://primefaces.org/ui">
	  
<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Netz melden</title>
	
	 <link rel="icon"
          type="image/x-icon"
           href="#{resource['img:favicon/favicon-npo.ico']}" />
	
	<h:outputStylesheet library="bootstrap" name="css/bootstrap.min.css" />
	<h:outputStylesheet library="css" name="styles.css"  />
</h:head>

<h:body>

<header id="top" class="container-fluid py-2">
      <!-- div-Layout Container, damit header-Inhalt dieselben Seitlichen Abstände haben wie der Content-Bereich -->
      <div class="container">
        <!-- Responsive Header-Anordnung: auf kleinen Displays (<768px) untereinander, ab md nebeneinander: -->
        <!-- row mit flex-column (vertikale Anordnung auf sm Displays), flex-md-row (Logo und Überschrift nebeneinander ab md) -->
        <div class="row flex-column flex-md-row align-items-center align-items-md-center gap-3">
          <div class="col-12 col-md-auto text-center text-md-start">
            <h:link outcome="index" title="Zur Startseite">
          <h:graphicImage library="img"
                name="logo-npo.png"
                alt="Logo der NPO"
                styleClass="img-fluid header-logo" />
           </h:link>
          </div>
          
          <div class="col-12 col-md">
            <h1 class="text-center text-md-start">
              Geisternetz melden
            </h1>
          </div>
        </div>
      </div>
    </header>
    
    <main class="container my-4 p-4 bg-light rounded">
	<h:form id="netzMeldenForm">
		<p:growl id="growl" showDetail="true"/>
		
		 <!-- Allgemeines Growl für alle Aktionen auf dieser Seite. Spezifische Fehlermeldungen für einzelne Schritte werden direkt unter den jeweiligen Eingabefeldern 
		 angezeigt, damit die Nutzer:innen sofort sehen, welche Eingaben korrigiert werden müssen. -->
		 <p:messages id="globalMessages" 
	                showSummary="true"
	                showDetail="true"
	                closable="true"
	                styleClass="mt-3" />
		
		<p:card id="custCard" styleClass="mt-1" >

        <p:wizard flowListener="#{geisternetzMeldenController.onFlowProcess}" 
        		  widgetVar="netzWizard">
        
         <!--  Persönliche Daten (optional) -->		  
		<p:tab id="personal" title="Persönliche Daten">
                <p:focus context="@next"/> <!-- Fokus auf das erste Eingabefeld dieses Schrittes setzen, wenn der Tab aktiviert wird -->
                <p:panel header="Persönliche Daten sind optional. Bitte geben sie die Telefonnummer im internationalen Format an (z.B. +49 123 4567890)." styleClass="mb-4">
                
                <p:messages id="personalMessages" showSummary="true" showDetail="true" closable="true"/> <!-- Spezifische Fehlermeldungen für diesen Schritt -->
                	
        <div class="row g-3 align-items-end">
        <div class="col-12 col-md-5">
                <span class="ui-float-label w-100">
                    <p:inputText id="name"
                                 value="#{geisternetzMeldenController.meldendePerson.name}"
                                 required="#{!geisternetzMeldenController.anonymMelden}"
                                 disabled="#{geisternetzMeldenController.anonymMelden}"
                                 placeholder=" "
                                 requiredMessage="Bitte geben Sie einen Namen ein."
                                 styleClass="w-100" />
                    <p:outputLabel for="name" value="Name" />
                </span>
            </div>

            <div class="col-12 col-md-5">
                <span class="ui-float-label w-100">
                    <p:inputText id="telefonnummer"
                                 value="#{geisternetzMeldenController.meldendePerson.telefonnummer}"
                                 required="#{!geisternetzMeldenController.anonymMelden}"
                                 disabled="#{geisternetzMeldenController.anonymMelden}"
                                 placeholder=" "
                                 validator="#{geisternetzMeldenController.validateTelefonnummer}"
                                 maxlength="25"
                                 requiredMessage="Bitte geben Sie eine internationale Telefonnummer ein."
                                 styleClass="w-100" />
                    <p:outputLabel for="telefonnummer" value="Telefonnummer" />
                </span>
            </div>

    	<div class="col-12 col-md-2">
	        <h5 class="mt-0 mb-2">Anonym</h5>
	        <p:toggleSwitch id="anonymSwitch"
	                        value="#{geisternetzMeldenController.anonymMelden}">
	            <p:ajax process="@this" update=":netzMeldenForm:name :netzMeldenForm:telefonnummer" />
	        </p:toggleSwitch>
    	</div>
		</div>   	 
        </p:panel>
		</p:tab>
		
		<!-- Schritt 2: Geisternetzdaten -->
		<p:tab id="geisternetzDetails" title="Geisternetz Details">
			<p:panel header="Details zum Geisternetz: Angaben bitte in GPX-Format (Dezimalgrad).">
			
			<h:panelGrid columns="2" columnClasses="label, value">
				
				<p:outputLabel for="lat" value="Breitengrad:" />
				<p:inputNumber id="lat"
							   value="#{geisternetzMeldenController.geisternetz.lat}"
							   decimalPlaces="6"
							   decimalSeparator="."
               				   thousandSeparator=""
							   minValue="-90"
							   maxValue="90"
							   required="true"
							   requiredMessage="Bitte geben Sie den Breitengrad ein."
							   styleClass="w-100" 
							   placeholder="z.B. -69.696969"/>

				<p:outputLabel for="lon" value="Längengrad:" />
				<p:inputNumber id="lon"
							   value="#{geisternetzMeldenController.geisternetz.lon}"
							   decimalPlaces="6"
							   decimalSeparator="."
               				   thousandSeparator="" 
							   minValue="-180"
							   maxValue="180"
							   required="true"
							   requiredMessage="Bitte geben Sie den Längengrad ein."
							   styleClass="w-100" 
							   placeholder="z.B. -150.000009"/>

				<p:outputLabel for="groesse" value="Geschätzte Größe:" />
				<p:inputNumber id="groesse"
							   value="#{geisternetzMeldenController.geisternetz.geschaetzteGroesse}"
							   decimalPlaces="0"
							   minValue="1"
							   required="true"
							   requiredMessage="Bitte geben Sie die geschätzte Größe ein."
							   styleClass="w-100"
							   placeholder="in m²"/>

			</h:panelGrid>
			</p:panel>
		</p:tab>

		<!-- Schritt 3: Zusammenfassung -->
		<p:tab id="zusammenfassung" title="Zusammenfassung" styleClass="bg-info">
			<p:panel header="Zusammenfassung der Meldung">
            <h:panelGrid columns="2" columnClasses="fw-bold, value" styleClass="mb-4">

                            <h:outputText value="Anonyme Meldung:" />
                            <h:outputText value="#{geisternetzMeldenController.anonymMelden ? 'Ja' : 'Nein'}" />

                            <h:outputText value="Name:" />
                            <h:outputText value="#{geisternetzMeldenController.anonymMelden ? '-' : geisternetzMeldenController.meldendePerson.name}" />

                            <h:outputText value="Telefonnummer:" />
                            <h:outputText value="#{geisternetzMeldenController.anonymMelden ? '-' : geisternetzMeldenController.meldendePerson.telefonnummer}" />

                            <h:outputText value="Breitengrad:" />
                            <h:outputText value="#{geisternetzMeldenController.geisternetz.lat}" />

                            <h:outputText value="Längengrad:" />
                            <h:outputText value="#{geisternetzMeldenController.geisternetz.lon}" />

                            <h:outputText value="Geschätzte Größe:" />
                            <h:outputText value="#{geisternetzMeldenController.geisternetz.geschaetzteGroesse} m²" />

                        </h:panelGrid>

          	<p:commandButton value="Geisternetz speichern"
            				 icon="pi pi-save"
            				 action="#{geisternetzMeldenController.speichern}"
            				 update="growl globalMessages"
            				 styleClass="ms-1" 
            				 process="@form" /> <!-- Alle Eingaben speicher und verarbeiten. -->			
                      
			<p:button value="Weiteres Geisternetz melden" 
			          icon="pi pi-plus"
			          outcome="netz-melden"
			          styleClass="ms-2" /> <!-- Da das Formular Viewscoped ist, wird die Seite neu geladen und alle Eingaben zurückgesetzt, sodass direkt ein neues Geisternetz gemeldet werden kann.  -->
          	
          	<p:button value="Zurück zur Startseite"
            		  icon="pi pi-home"
                      outcome="index"
                      styleClass="ms-2" />
          	
                </p:panel>
            </p:tab>
        </p:wizard>
	</p:card>
	</h:form>
	</main>
	</h:body>
</html>
